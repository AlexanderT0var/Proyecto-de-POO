<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProjectTrack — Gestión de Proyectos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="estilos.css" />
</head>
<body>

<!-- ═══════════════════════════════════════
     LOGIN
════════════════════════════════════════ -->
<div id="login-container" class="login-wrap">
    <div class="login-card">
        <div class="login-brand">
            <div class="login-logo">PT</div>
            <h1>ProjectTrack</h1>
            <p>Sistema de Gestión de Proyectos</p>
        </div>
        <form id="login-form">
            <div class="field-group" id="name-group" style="display:none">
                <label>Nombre completo</label>
                <input type="text" id="reg-name" placeholder="Tu nombre completo" />
            </div>
            <div class="field-group">
                <label>Correo electrónico</label>
                <input type="email" id="email" placeholder="correo@empresa.com" />
            </div>
            <div class="field-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" />
            </div>
            <div id="login-error" class="login-error-box" style="display:none"></div>
            <button type="submit" id="btn-auth" class="btn-login">Iniciar sesión</button>
        </form>
        <p id="toggle-auth" class="login-toggle">
            ¿Primera vez? <span onclick="app.showRegisterMain()">Crear cuenta administrador</span>
        </p>
    </div>
</div>

<!-- ═══════════════════════════════════════
     APP SHELL
════════════════════════════════════════ -->
<div id="app-container" style="display:none">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-logo">PT</div>
            <div>
                <div class="sidebar-title">ProjectTrack</div>
                <div class="sidebar-sub" id="active-user-role">—</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-label">Principal</div>
            <li class="nav-item active" id="nav-dashboard" onclick="app.view('dashboard',this)">
                <span class="nav-icon">⬡</span> Dashboard
            </li>
            <li class="nav-item" id="nav-proyectos" onclick="app.view('proyectos',this)">
                <span class="nav-icon">◈</span> Proyectos
            </li>
            <li class="nav-item" id="nav-tareas" onclick="app.view('tareas',this)">
                <span class="nav-icon">◎</span> Tareas
            </li>
            <div class="nav-label" id="admin-section" style="display:none">Administración</div>
            <li class="nav-item" id="nav-usuarios" onclick="app.view('usuarios',this)" style="display:none">
                <span class="nav-icon">◷</span> Usuarios
            </li>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="user-avatar" id="user-avatar">?</div>
                <div>
                    <div class="user-name" id="active-user-name">—</div>
                    <div class="user-role-small" id="active-user-role2">—</div>
                </div>
            </div>
            <button class="btn-logout" onclick="app.logout()">Salir</button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-area">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <h2 class="page-title" id="page-title">Dashboard</h2>
            </div>
            <div class="topbar-right">
                <div class="topbar-user">
                    <div class="avatar-sm" id="topbar-avatar">?</div>
                    <span id="topbar-name">—</span>
                </div>
            </div>
        </header>

        <!-- CONTENT VIEWS -->
        <div class="content-area" id="main-content"></div>
    </main>
</div>

<!-- ═══════════════════════════════════════
     MODAL GLOBAL
════════════════════════════════════════ -->
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)app.closeModal()">
    <div class="modal-box" id="modal-box"></div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="codigo.js"></script>
</body>
</html>
