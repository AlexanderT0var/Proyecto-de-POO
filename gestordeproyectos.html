<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProjectTrack — Gestión de Proyectos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg width='36' height='36' viewBox='0 0 36 36' fill='none' xmlns='http://www.w3.org/2000/svg'><rect width='36' height='36' rx='10' fill='url(%23lg)'/><rect x='5' y='14' width='7' height='14' rx='2' fill='white' opacity='0.9'/><rect x='14' y='9' width='7' height='19' rx='2' fill='white' opacity='0.9'/><rect x='23' y='11' width='7' height='12' rx='2' fill='white' opacity='0.9'/><defs><linearGradient id='lg' x1='0' y1='0' x2='36' y2='36' gradientUnits='userSpaceOnUse'><stop stop-color='%233b82f6'/><stop offset='1' stop-color='%238b5cf6'/></linearGradient></defs></svg>" />
    <link rel="stylesheet" href="estilos.css" />
</head>
<body>

<!-- ═══════════════════════════════════════
     LOGIN
════════════════════════════════════════ -->
<div id="login-container" class="login-wrap">
    <div class="login-card">
        <div class="login-brand">
            <div class="login-logo"><svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="52" height="52" rx="14" fill="url(#lgl)"/>
  <!-- 3 kanban columns -->
  <rect x="7"  y="20" width="10" height="20" rx="3" fill="white" opacity="0.9"/>
  <rect x="21" y="13" width="10" height="27" rx="3" fill="white" opacity="0.9"/>
  <rect x="35" y="16" width="10" height="17" rx="3" fill="white" opacity="0.9"/>
  <defs>
    <linearGradient id="lgl" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
</svg></div>
            <h1>ProjectTrack</h1>
            <p>Sistema de Gestión de Proyectos</p>
        </div>
        <form id="login-form">
            <div class="field-group" id="name-group" style="display:none">
                <label>Nombre completo</label>
                <input type="text" id="reg-name" placeholder="Tu nombre completo" />
            </div>
            <div class="field-group">
                <label>Correo electrónico</label>
                <input type="email" id="email" placeholder="correo@empresa.com" />
            </div>
            <div class="field-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" />
            </div>
            <div id="login-error" class="login-error-box" style="display:none"></div>
            <button type="submit" id="btn-auth" class="btn-login">Iniciar sesión</button>
        </form>
        <p id="toggle-auth" class="login-toggle">
            ¿Primera vez? <span onclick="app.showRegisterMain()">Crear cuenta administrador</span>
        </p>
    </div>
</div>

<!-- ═══════════════════════════════════════
     APP SHELL
════════════════════════════════════════ -->
<div id="app-container" style="display:none">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-logo"><svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="36" height="36" rx="10" fill="url(#lg)"/>
  <!-- 3 kanban columns -->
  <rect x="5"  y="14" width="7" height="14" rx="2" fill="white" opacity="0.9"/>
  <rect x="14" y="9"  width="7" height="19" rx="2" fill="white" opacity="0.9"/>
  <rect x="23" y="11" width="7" height="12" rx="2" fill="white" opacity="0.9"/>
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
</svg></div>
            <div>
                <div class="sidebar-title">ProjectTrack</div>
                <div class="sidebar-sub" id="active-user-role">—</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-label">Principal</div>
            <li class="nav-item active" id="nav-dashboard" onclick="app.view('dashboard',this)">
                <span class="nav-icon">⬡</span> Dashboard
            </li>
            <li class="nav-item" id="nav-proyectos" onclick="app.view('proyectos',this)">
                <span class="nav-icon">◈</span> Proyectos
            </li>
            <li class="nav-item" id="nav-tareas" onclick="app.view('tareas',this)">
                <span class="nav-icon">◎</span> Tareas
            </li>
            <div class="nav-label" id="admin-section" style="display:none">Administración</div>
            <li class="nav-item" id="nav-usuarios" onclick="app.view('usuarios',this)" style="display:none">
                <span class="nav-icon">◷</span> Usuarios
            </li>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="user-avatar" id="user-avatar">?</div>
                <div>
                    <div class="user-name" id="active-user-name">—</div>
                    <div class="user-role-small" id="active-user-role2">—</div>
                </div>
            </div>
            <button class="btn-logout" onclick="app.logout()">Salir</button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-area">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <h2 class="page-title" id="page-title">Dashboard</h2>
            </div>
            <div class="topbar-right">
                <div class="topbar-user">
                    <div class="avatar-sm" id="topbar-avatar">?</div>
                    <span id="topbar-name">—</span>
                </div>
            </div>
        </header>

        <!-- CONTENT VIEWS -->
        <div class="content-area" id="main-content"></div>
    </main>
</div>

<!-- ═══════════════════════════════════════
     MODAL GLOBAL
════════════════════════════════════════ -->
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)app.closeModal()">
    <div class="modal-box" id="modal-box"></div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="codigo.js"></script>
</body>
</html>
